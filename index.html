<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ColorLab">
  <meta name="theme-color" content="#050810">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>ColorLab Pro</title>
  <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand">
      <span class="brand-mark"></span>
      <div class="brand-text">
        <strong>ColorLab</strong>
        <small>PRO</small>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-undo" aria-label="撤销">
        <svg viewBox="0 0 24 24"><path d="M9 14H4V9l5 5zm0-5a7 7 0 1 1 0 14 7 7 0 0 1 0-14z" fill="currentColor"/></svg>
      </button>
      <button class="icon-btn" id="btn-redo" aria-label="重做">
        <svg viewBox="0 0 24 24"><path d="M15 14h5V9l-5 5zm0-5a7 7 0 1 0 0 14 7 7 0 0 0 0-14z" fill="currentColor"/></svg>
      </button>
      <button class="icon-btn accent" id="btn-compare" aria-label="对比原图">
        <svg viewBox="0 0 24 24"><path d="M12 4a8 8 0 1 0 8 8h-2a6 6 0 1 1-6-6V4zm0 4v4l3 2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
    </div>
  </header>

  <section class="viewport" id="viewport">
    <div class="viewport-grid"></div>
    <canvas id="canvas"></canvas>
    <div class="viewport-empty" id="empty">
      <div class="empty-ring"></div>
      <p>导入照片 · GPU 实时调色</p>
      <span>支持 RAW/JPEG · 60fps 预览</span>
    </div>
    <div class="compare-badge" id="compare-badge">ORIGINAL</div>
    <canvas id="canvas-original" class="hidden"></canvas>
  </section>

  <nav class="tool-rail" id="tool-rail">
    <button class="tool active" data-tool="light"><span>光效</span></button>
    <button class="tool" data-tool="color"><span>色彩</span></button>
    <button class="tool" data-tool="curve"><span>曲线</span></button>
    <button class="tool" data-tool="hsl"><span>HSL</span></button>
    <button class="tool" data-tool="split"><span>分离</span></button>
    <button class="tool" data-tool="fx"><span>效果</span></button>
    <button class="tool" data-tool="look"><span>风格</span></button>
  </nav>

  <section class="panel" id="panel">
    <!-- Light -->
    <div class="tool-panel active" data-panel="light">
      <div class="param" data-key="exposure" data-min="-2" data-max="2" data-step="0.01" data-scale="1">
        <label>曝光</label><output>0.00</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="contrast" data-min="-100" data-max="100" data-step="1">
        <label>对比度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="highlights" data-min="-100" data-max="100" data-step="1">
        <label>高光</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="shadows" data-min="-100" data-max="100" data-step="1">
        <label>阴影</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="whites" data-min="-100" data-max="100" data-step="1">
        <label>白色</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="blacks" data-min="-100" data-max="100" data-step="1">
        <label>黑色</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Color -->
    <div class="tool-panel" data-panel="color">
      <div class="param" data-key="temperature" data-min="-100" data-max="100" data-step="1">
        <label>色温</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="tint" data-min="-100" data-max="100" data-step="1">
        <label>色调</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="vibrance" data-min="-100" data-max="100" data-step="1">
        <label>自然饱和</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="saturation" data-min="-100" data-max="100" data-step="1">
        <label>饱和度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Curve -->
    <div class="tool-panel" data-panel="curve">
      <div class="curve-tabs">
        <button class="curve-tab active" data-ch="master">RGB</button>
        <button class="curve-tab" data-ch="R">R</button>
        <button class="curve-tab" data-ch="G">G</button>
        <button class="curve-tab" data-ch="B">B</button>
      </div>
      <canvas id="curve-canvas" width="320" height="200"></canvas>
      <button class="text-btn" id="curve-reset">重置曲线</button>
    </div>

    <!-- HSL -->
    <div class="tool-panel" data-panel="hsl">
      <div class="chip-row" id="hsl-chips">
        <button class="chip active" data-ch="red">红</button>
        <button class="chip" data-ch="orange">橙</button>
        <button class="chip" data-ch="yellow">黄</button>
        <button class="chip" data-ch="green">绿</button>
        <button class="chip" data-ch="cyan">青</button>
        <button class="chip" data-ch="blue">蓝</button>
        <button class="chip" data-ch="purple">紫</button>
        <button class="chip" data-ch="magenta">品</button>
      </div>
      <div id="hsl-params"></div>
    </div>

    <!-- Split tone -->
    <div class="tool-panel" data-panel="split">
      <p class="panel-hint">分离色调 — 阴影/高光独立着色</p>
      <div class="param" data-key="splitShadowHue" data-min="0" data-max="360" data-step="1">
        <label>阴影色相</label><output>220</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitShadowSat" data-min="0" data-max="100" data-step="1">
        <label>阴影饱和</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitHighlightHue" data-min="0" data-max="360" data-step="1">
        <label>高光色相</label><output>40</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitHighlightSat" data-min="0" data-max="100" data-step="1">
        <label>高光饱和</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitBalance" data-min="-100" data-max="100" data-step="1">
        <label>平衡</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- FX -->
    <div class="tool-panel" data-panel="fx">
      <div class="param" data-key="clarity" data-min="0" data-max="100" data-step="1">
        <label>清晰度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="vignette" data-min="0" data-max="100" data-step="1">
        <label>暗角</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="grain" data-min="0" data-max="100" data-step="1">
        <label>颗粒</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Looks / Presets -->
    <div class="tool-panel" data-panel="look">
      <div class="chip-row" id="preset-cats"></div>
      <div class="look-grid" id="look-grid"></div>
      <div class="param hidden" id="preset-strength" data-key="presetStrength" data-min="10" data-max="100" data-step="1">
        <label>风格强度</label><output>100</output>
        <input type="range" class="param-slider" value="100">
      </div>
    </div>
  </section>

  <footer class="dock">
    <button class="dock-btn" id="btn-import">
      <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0l-4 4m4-4l4 4M4 20h16" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      导入
    </button>
    <button class="dock-btn" id="btn-reset">
      <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14-5M20 12a8 8 0 0 1-14 5" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      重置
    </button>
    <button class="dock-btn primary" id="btn-export">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      导出
    </button>
  </footer>
</div>

<input type="file" id="file-input" accept="image/*" hidden>
<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" style="display:none!important" aria-hidden="true">
  <div class="overlay-card"><div class="spinner"></div><p>正在导出全分辨率…</p></div>
</div>

<script src="gl-engine.js?v=4"></script>
<script src="presets.js?v=4"></script>
<script src="app.js?v=4"></script>
</body>
</html>
