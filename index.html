<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ColorLab">
  <meta name="theme-color" content="#050810">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>ColorLab Pro</title>
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand">
      <span class="brand-mark"></span>
      <div class="brand-text">
        <strong>ColorLab</strong>
        <small>PRO</small>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" class="hdr-btn" id="btn-undo" aria-label="撤销上一步">
        <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" fill="currentColor" transform="rotate(90 12 12)"/><path d="M12 4c-4.42 0-8 3.58-8 8H2l3.5 3.5L9 12H7c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5v2c3.87 0 7-3.13 7-7s-3.13-7-7-7z" fill="currentColor"/></svg>
        <span>撤销</span>
      </button>
      <button type="button" class="hdr-btn" id="btn-redo" aria-label="重做">
        <svg viewBox="0 0 24 24"><path d="M12 4c4.42 0 8 3.58 8 8h2l-3.5 3.5L13 12h2c0-2.76-2.24-5-5-5S5 9.24 5 12s2.24 5 5 5v-2c-3.87 0-7-3.13-7-7s3.13-7 7-7z" fill="currentColor"/></svg>
        <span>重做</span>
      </button>
      <button type="button" class="hdr-btn accent" id="btn-compare" aria-label="对比原图">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="8" height="14" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="13" y="5" width="8" height="14" rx="1" stroke="currentColor" stroke-width="1.5" fill="currentColor" opacity="0.3"/></svg>
        <span>对比</span>
      </button>
    </div>
  </header>

  <section class="viewport" id="viewport">
    <div class="viewport-grid"></div>
    <div class="viewport-stack" id="viewport-stack">
      <canvas id="canvas-original" class="hidden"></canvas>
      <div class="canvas-clip" id="canvas-clip">
        <canvas id="canvas"></canvas>
      </div>
      <div class="compare-handle hidden" id="compare-handle">
        <div class="compare-line"></div>
        <div class="compare-knob">◀ ▶</div>
      </div>
    </div>
    <canvas id="histogram" class="histogram hidden" width="280" height="48"></canvas>
    <div class="viewport-empty" id="empty">
      <div class="empty-ring"></div>
      <p>导入照片 · GPU 实时调色</p>
      <span>支持 JPEG/HEIC · 60fps 预览</span>
    </div>
    <div class="compare-badge" id="compare-badge">原图 ◀ ▶ 调色</div>
  </section>

  <nav class="tool-rail" id="tool-rail">
    <button type="button" class="tool active" data-tool="quick"><span>快捷</span></button>
    <button type="button" class="tool" data-tool="light"><span>光效</span></button>
    <button type="button" class="tool" data-tool="color"><span>色彩</span></button>
    <button type="button" class="tool" data-tool="curve"><span>曲线</span></button>
    <button type="button" class="tool" data-tool="hsl"><span>HSL</span></button>
    <button type="button" class="tool" data-tool="split"><span>分离</span></button>
    <button type="button" class="tool" data-tool="fx"><span>效果</span></button>
    <button type="button" class="tool" data-tool="look"><span>风格</span></button>
    <button type="button" class="tool ai-tool" data-tool="ai"><span>AI</span></button>
  </nav>

  <section class="panel" id="panel">
    <!-- Quick -->
    <div class="tool-panel active" data-panel="quick">
      <div class="quick-actions">
        <button type="button" class="quick-btn primary" id="quick-auto">✦ 一键智能修图</button>
        <button type="button" class="quick-btn" id="quick-levels">自动色阶</button>
      </div>
      <div class="quick-row">
        <button type="button" class="quick-icon" id="btn-rotate-left" title="向左旋转">↺</button>
        <button type="button" class="quick-icon" id="btn-rotate-right" title="向右旋转">↻</button>
        <button type="button" class="quick-icon" id="btn-histogram" title="直方图">📊</button>
        <button type="button" class="quick-icon" id="btn-flip-h" title="水平翻转">⇋</button>
      </div>
      <div class="param" data-key="exposure" data-min="-2" data-max="2" data-step="0.01">
        <label>曝光</label><output>0.00</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="contrast" data-min="-100" data-max="100" data-step="1">
        <label>对比度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="saturation" data-min="-100" data-max="100" data-step="1">
        <label>饱和度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="temperature" data-min="-100" data-max="100" data-step="1">
        <label>色温</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="highlights" data-min="-100" data-max="100" data-step="1">
        <label>高光</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="shadows" data-min="-100" data-max="100" data-step="1">
        <label>阴影</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Light -->
    <div class="tool-panel" data-panel="light">
      <div class="param" data-key="exposure" data-min="-2" data-max="2" data-step="0.01" data-scale="1">
        <label>曝光</label><output>0.00</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="contrast" data-min="-100" data-max="100" data-step="1">
        <label>对比度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="highlights" data-min="-100" data-max="100" data-step="1">
        <label>高光</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="shadows" data-min="-100" data-max="100" data-step="1">
        <label>阴影</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="whites" data-min="-100" data-max="100" data-step="1">
        <label>白色</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="blacks" data-min="-100" data-max="100" data-step="1">
        <label>黑色</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Color -->
    <div class="tool-panel" data-panel="color">
      <div class="param" data-key="temperature" data-min="-100" data-max="100" data-step="1">
        <label>色温</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="tint" data-min="-100" data-max="100" data-step="1">
        <label>色调</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="vibrance" data-min="-100" data-max="100" data-step="1">
        <label>自然饱和</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="saturation" data-min="-100" data-max="100" data-step="1">
        <label>饱和度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Curve -->
    <div class="tool-panel" data-panel="curve">
      <div class="curve-tabs">
        <button class="curve-tab active" data-ch="master">RGB</button>
        <button class="curve-tab" data-ch="R">R</button>
        <button class="curve-tab" data-ch="G">G</button>
        <button class="curve-tab" data-ch="B">B</button>
      </div>
      <canvas id="curve-canvas" width="320" height="200"></canvas>
      <button class="text-btn" id="curve-reset">重置曲线</button>
    </div>

    <!-- HSL -->
    <div class="tool-panel" data-panel="hsl">
      <div class="chip-row" id="hsl-chips">
        <button class="chip active" data-ch="red">红</button>
        <button class="chip" data-ch="orange">橙</button>
        <button class="chip" data-ch="yellow">黄</button>
        <button class="chip" data-ch="green">绿</button>
        <button class="chip" data-ch="cyan">青</button>
        <button class="chip" data-ch="blue">蓝</button>
        <button class="chip" data-ch="purple">紫</button>
        <button class="chip" data-ch="magenta">品</button>
      </div>
      <div id="hsl-params"></div>
    </div>

    <!-- Split tone -->
    <div class="tool-panel" data-panel="split">
      <p class="panel-hint">分离色调 — 阴影/高光独立着色</p>
      <div class="param" data-key="splitShadowHue" data-min="0" data-max="360" data-step="1">
        <label>阴影色相</label><output>220</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitShadowSat" data-min="0" data-max="100" data-step="1">
        <label>阴影饱和</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitHighlightHue" data-min="0" data-max="360" data-step="1">
        <label>高光色相</label><output>40</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitHighlightSat" data-min="0" data-max="100" data-step="1">
        <label>高光饱和</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="splitBalance" data-min="-100" data-max="100" data-step="1">
        <label>平衡</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- FX -->
    <div class="tool-panel" data-panel="fx">
      <div class="param" data-key="clarity" data-min="0" data-max="100" data-step="1">
        <label>清晰度</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="sharpening" data-min="0" data-max="100" data-step="1">
        <label>锐化</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="dehaze" data-min="0" data-max="100" data-step="1">
        <label>去雾</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="vignette" data-min="0" data-max="100" data-step="1">
        <label>暗角</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
      <div class="param" data-key="grain" data-min="0" data-max="100" data-step="1">
        <label>颗粒</label><output>0</output>
        <input type="range" class="param-slider">
      </div>
    </div>

    <!-- Looks / Presets -->
    <div class="tool-panel" data-panel="look">
      <div class="chip-row" id="preset-cats"></div>
      <div class="look-grid" id="look-grid"></div>
      <div class="param hidden" id="preset-strength" data-key="presetStrength" data-min="10" data-max="100" data-step="1">
        <label>风格强度</label><output>100</output>
        <input type="range" class="param-slider" value="100">
      </div>
    </div>

    <!-- AI -->
    <div class="tool-panel" data-panel="ai">
      <p class="panel-hint">本地 Vision Agent 分析画面，一键智能修图或输入描述</p>
      <button type="button" class="ai-auto" id="ai-auto">✦ 一键智能修图</button>
      <textarea id="ai-prompt" class="ai-input" rows="2" placeholder="例如：日系清新一点、电影感青橙色调、人像肤色更柔和…"></textarea>
      <div class="ai-chips" id="ai-chips">
        <button type="button" class="ai-chip">日系清新</button>
        <button type="button" class="ai-chip">电影青橙</button>
        <button type="button" class="ai-chip">人像肤色</button>
        <button type="button" class="ai-chip">提亮暗部</button>
        <button type="button" class="ai-chip">赛博朋克</button>
        <button type="button" class="ai-chip">自动优化</button>
      </div>
      <button type="button" class="ai-apply" id="ai-apply">按描述 AI 调色</button>
      <p class="ai-result" id="ai-result"></p>
      <details class="ai-settings">
        <summary>高级：OpenAI API（可选，视觉分析更准）</summary>
        <label class="ai-check"><input type="checkbox" id="ai-use-cloud"> 使用云端 AI（需 API Key）</label>
        <input type="password" id="ai-api-key" class="ai-settings-input" placeholder="sk-… API Key" autocomplete="off">
        <input type="text" id="ai-api-base" class="ai-settings-input" placeholder="API 地址（默认 OpenAI）">
        <button type="button" class="text-btn" id="ai-save-key">保存设置</button>
      </details>
    </div>
  </section>

  <footer class="dock">
    <button class="dock-btn" id="btn-import">
      <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0l-4 4m4-4l4 4M4 20h16" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      导入
    </button>
    <button class="dock-btn" id="btn-reset">
      <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14-5M20 12a8 8 0 0 1-14 5" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      重置
    </button>
    <button class="dock-btn primary" id="btn-export">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      导出
    </button>
  </footer>
</div>

<input type="file" id="file-input" accept="image/*" hidden>
<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" style="display:none!important" aria-hidden="true">
  <div class="overlay-card"><div class="spinner"></div><p>正在导出全分辨率…</p></div>
</div>

<script src="image-loader.js?v=10"></script>
<script src="gl-engine.js?v=10"></script>
<script src="presets.js?v=10"></script>
<script src="vision-agent.js?v=10"></script>
<script src="ai-grade.js?v=10"></script>
<script src="app.js?v=10"></script>
</body>
</html>
